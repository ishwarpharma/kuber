<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUBER</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:white;
}

.login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{
background:#162033;
padding:25px;
border-radius:20px;
width:100%;
max-width:380px;
}

.logo{
text-align:center;
font-size:34px;
font-weight:bold;
color:#f59e0b;
}

.sub{
text-align:center;
color:#94a3b8;
margin:10px 0 25px;
}

.dots{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.dot{
width:15px;
height:15px;
border-radius:50%;
border:2px solid #334155;
}

.fill{
background:#f59e0b;
border-color:#f59e0b;
}

.pin{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.btn{
background:#1f2d45;
color:white;
border:none;
border-radius:12px;
padding:18px;
font-size:22px;
}

.error{
text-align:center;
color:#ef4444;
margin-top:15px;
height:20px;
}

.top{
background:#162033;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#162033;
color:white;
font-size:16px;
}

.list{
padding:15px;
padding-bottom:100px;
}

.party{
background:#162033;
padding:15px;
border-radius:16px;
margin-bottom:10px;
}

.orange{
color:#f59e0b;
}

.red{
color:#ef4444;
}

a{
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div id="loginScreen" class="login">

<div class="card">

<div class="logo">💰 KUBER</div>
<div class="sub">Smart Outstanding Manager</div>

<div class="dots">
<div class="dot" id="d0"></div>
<div class="dot" id="d1"></div>
<div class="dot" id="d2"></div>
<div class="dot" id="d3"></div>
<div class="dot" id="d4"></div>
<div class="dot" id="d5"></div>
</div>

<div class="pin">
<button class="btn" onclick="pressPin('1')">1</button>
<button class="btn" onclick="pressPin('2')">2</button>
<button class="btn" onclick="pressPin('3')">3</button>
<button class="btn" onclick="pressPin('4')">4</button>
<button class="btn" onclick="pressPin('5')">5</button>
<button class="btn" onclick="pressPin('6')">6</button>
<button class="btn" onclick="pressPin('7')">7</button>
<button class="btn" onclick="pressPin('8')">8</button>
<button class="btn" onclick="pressPin('9')">9</button>
<div></div>
<button class="btn" onclick="pressPin('0')">0</button>
<button class="btn" onclick="backPin()">⌫</button>
</div>

<div class="error" id="error"></div>

</div>

</div>

<div id="app" style="display:none">

<div class="top">
<div id="userLabel">KUBER</div>
<button onclick="logout()">Lock</button>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search Party..." oninput="renderList()">
</div>

<div class="list" id="list"></div>

</div>

<script>

const CSV_BASE='https://raw.githubusercontent.com/ishwarpharma/kuber/main/';
const USERS_URL=CSV_BASE+'users.json';

let pin='';
let currentUser=null;
let parties=[];

function updateDots(){

for(let i=0;i<6;i++){

document.getElementById('d'+i).className=
i<pin.length?'dot fill':'dot';

}

}

function pressPin(n){

if(pin.length>=6)return;

pin+=n;

updateDots();

if(pin.length===6){

login();

}

}

function backPin(){

pin=pin.slice(0,-1);

updateDots();

}

async function login(){

try{

const res=await fetch(USERS_URL);

const users=await res.json();

if(!users[pin]){

document.getElementById('error').innerText='Invalid PIN';

pin='';

updateDots();

return;

}

localStorage.setItem('kuber_pin',pin);

currentUser=users[pin];

document.getElementById('userLabel').innerHTML=
'👤 '+currentUser.nickname;

document.getElementById('loginScreen').style.display='none';

document.getElementById('app').style.display='block';

await loadData();

}catch(e){

document.getElementById('error').innerText='Unable to load users.json';

}

}

function logout(){

localStorage.removeItem('kuber_pin');

location.reload();

}

async function loadData(){

const pm=await fetch(CSV_BASE+'partymst.csv').then(r=>r.text());

const ls=await fetch(CSV_BASE+'ledgersummary.csv').then(r=>r.text());

const ledger={};

ls.split('\n').slice(1).forEach(line=>{

const c=line.split(',');

ledger[c[0]]={

total:parseFloat(c[1])||0,

overdue:
(parseFloat(c[1])||0)-
(parseFloat(c[2])||0)-
(parseFloat(c[3])||0)-
(parseFloat(c[4])||0)

};

});

parties=[];

pm.split('\n').slice(1).forEach(line=>{

const c=line.split(',');

const name=c[2];

const area=c[23];

if(!name)return;

if(
!currentUser.areas.includes('ALL') &&
!currentUser.areas.includes(area)
) return;

if(!ledger[name]) return;

parties.push({

name:name,
area:area,
mobile:c[15],
total:ledger[name].total,
overdue:ledger[name].overdue

});

});

renderList();

}

function renderList(){

const q=
document.getElementById('search')
.value
.toLowerCase();

const filtered=parties
.filter(p=>p.name.toLowerCase().includes(q))
.sort((a,b)=>b.overdue-a.overdue);

document.getElementById('list').innerHTML=

filtered.map(p=>`

<div class="party">

<div><b>${p.name}</b></div>

<div class="orange">${p.area}</div>

<div>Total O/S: ₹${Math.round(p.total).toLocaleString('en-IN')}</div>

<div class="red">Overdue: ₹${Math.round(p.overdue).toLocaleString('en-IN')}</div>

<div style="margin-top:10px">

<a href="tel:${p.mobile}">📞 Call</a>

&nbsp;&nbsp;

<a href="https://wa.me/91${p.mobile}" target="_blank">💬 WhatsApp</a>

</div>

</div>

`).join('');

}

window.onload=async()=>{

const saved=localStorage.getItem('kuber_pin');

if(saved){

pin=saved;

updateDots();

await login();

}

};

</script>

</body>
</html>
